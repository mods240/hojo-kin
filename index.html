<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>補助金マッチング | AVA</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #14171c;
    --panel: #1c2028;
    --panel-hover: #232833;
    --border: #2c313c;
    --text: #e8eaed;
    --text-dim: #9099a8;
    --accent: #4d8dff;
    --accent-dim: #2a3a5c;
    --good: #3fbf7f;
    --good-bg: #1a3327;
    --bad: #e2574c;
    --bad-bg: #35201f;
    --pending: #d9a441;
    --radius: 10px;
    font-size: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 700;
    margin: 0 0 4px;
    letter-spacing: 0.01em;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin: 0 0 16px;
  }
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }
  .filter-btn:hover { background: var(--panel-hover); }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
  }
  .status-msg {
    color: var(--text-dim);
    text-align: center;
    padding: 60px 20px;
    font-size: 0.9rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .card.decided-apply { border-color: var(--good); }
  .card.decided-skip { opacity: 0.5; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 0.98rem;
    font-weight: 600;
    line-height: 1.4;
  }
  .score-badge {
    flex-shrink: 0;
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 700;
    font-size: 0.8rem;
    padding: 3px 9px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .reason {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .meta span { white-space: nowrap; }
  .meta .deadline-soon { color: var(--pending); font-weight: 600; }

  .actions {
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 9px 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-apply:hover { background: var(--good-bg); border-color: var(--good); color: var(--good); }
  .btn-skip:hover { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); }
  .btn-apply.active { background: var(--good-bg); border-color: var(--good); color: var(--good); }
  .btn-skip.active { background: var(--bad-bg); border-color: var(--bad); color: var(--bad); }
  .btn-reset {
    flex: none;
    width: 40px;
    color: var(--text-dim);
  }
  .btn-reset:hover { background: var(--panel-hover); }

  .support-toggle {
    width: 100%;
    margin-top: 8px;
    padding: 8px 0;
    border-radius: 8px;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--accent);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  .support-toggle:hover { background: var(--accent-dim); }

  .support-panel {
    margin-top: 10px;
    padding: 14px;
    border-radius: 8px;
    background: #10131a;
    border: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .support-panel h4 {
    margin: 14px 0 6px;
    font-size: 0.8rem;
    color: var(--accent);
  }
  .support-panel h4:first-child { margin-top: 0; }
  .support-panel p { margin: 0; color: var(--text-dim); }
  .support-panel ol, .support-panel ul {
    margin: 0;
    padding-left: 18px;
    color: var(--text-dim);
  }
  .support-panel li { margin-bottom: 4px; }
  .support-panel .search-hint {
    display: inline-block;
    margin-top: 2px;
    padding: 2px 8px;
    background: var(--panel);
    border-radius: 5px;
    font-family: monospace;
    color: var(--text);
  }
  .support-loading { color: var(--text-dim); font-size: 0.82rem; padding: 6px 0; }
</style>
</head>
<body>

<header>
  <h1>補助金マッチング候補</h1>
  <p class="subtitle" id="subtitle">読み込み中...</p>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="pending">未選択</button>
    <button class="filter-btn" data-filter="apply">申請する</button>
    <button class="filter-btn" data-filter="skip">見送る</button>
  </div>
</header>

<main>
  <div id="list"><div class="status-msg">読み込み中...</div></div>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAUH0FB780Hj2V-E2UpqjSDqDlHe8firPM",
  authDomain: "jgrants-fetch.firebaseapp.com",
  databaseURL: "https://jgrants-fetch-default-rtdb.firebaseio.com",
  projectId: "jgrants-fetch",
  storageBucket: "jgrants-fetch.firebasestorage.app",
  messagingSenderId: "97389862866",
  appId: "1:97389862866:web:d0212aa81b910b6d18720b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let subsidies = [];
let decisions = {};
let currentFilter = "all";
let supportOpen = {};   // key -> bool (パネルを開いているか)
let supportData = {};   // key -> { overview, steps, documents, tips, search_hint } | "loading" | "error"

function renderSupportSection(key) {
  const isOpen = supportOpen[key];
  const state = supportData[key];

  let panelHtml = "";
  if (isOpen) {
    if (state === "loading") {
      panelHtml = `<div class="support-panel"><div class="support-loading">AIが申請サポート情報を作成中...</div></div>`;
    } else if (state === "error") {
      panelHtml = `<div class="support-panel"><div class="support-loading">取得に失敗しました。もう一度お試しください。</div></div>`;
    } else if (state) {
      panelHtml = `
        <div class="support-panel">
          <p>${escapeHtml(state.overview || "")}</p>
          <h4>大まかな流れ</h4>
          <ol>${(state.steps || []).map((s) => `<li>${escapeHtml(s)}</li>`).join("")}</ol>
          <h4>準備が必要になりやすい書類</h4>
          <ul>${(state.documents || []).map((d) => `<li>${escapeHtml(d)}</li>`).join("")}</ul>
          <h4>ポイント・注意点</h4>
          <ul>${(state.tips || []).map((t) => `<li>${escapeHtml(t)}</li>`).join("")}</ul>
          <h4>公募要領を探すキーワード</h4>
          <p><span class="search-hint">${escapeHtml(state.search_hint || "")}</span></p>
        </div>
      `;
    }
  }

  return `
    <button class="support-toggle" onclick="toggleSupport('${key}')">
      ${isOpen ? "申請サポートを閉じる" : "🤖 申請サポートを見る"}
    </button>
    ${panelHtml}
  `;
}

async function toggleSupport(key) {
  supportOpen[key] = !supportOpen[key];

  if (supportOpen[key] && !supportData[key]) {
    supportData[key] = "loading";
    render();
    try {
      const res = await fetch(`/api/support?id=${encodeURIComponent(key)}`);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || "unknown error");
      supportData[key] = json;
    } catch (err) {
      console.error(err);
      supportData[key] = "error";
    }
  }
  render();
}

function formatDeadline(iso) {
  if (!iso) return "締切不明";
  const d = new Date(iso);
  const now = new Date();
  const daysLeft = Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  const dateStr = `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
  if (daysLeft <= 14 && daysLeft >= 0) {
    return { text: `締切 ${dateStr}（残り${daysLeft}日）`, soon: true };
  }
  return { text: `締切 ${dateStr}`, soon: false };
}

function formatMoney(n) {
  if (!n) return "上限額 不明";
  return `上限 ${Number(n).toLocaleString()}円`;
}

function render() {
  const listEl = document.getElementById("list");
  const sorted = [...subsidies].sort((a, b) => b.score - a.score);

  const filtered = sorted.filter((s) => {
    const decision = decisions[s._key]?.decision;
    if (currentFilter === "all") return true;
    if (currentFilter === "pending") return !decision;
    if (currentFilter === "apply") return decision === "apply";
    if (currentFilter === "skip") return decision === "skip";
    return true;
  });

  document.getElementById("subtitle").textContent =
    `全${subsidies.length}件中 ${filtered.length}件を表示`;

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="status-msg">該当する補助金はありません</div>';
    return;
  }

  listEl.innerHTML = filtered.map((s) => {
    const decision = decisions[s._key]?.decision;
    const deadline = formatDeadline(s.acceptance_end_datetime);
    const cardClass = decision === "apply" ? "decided-apply" : decision === "skip" ? "decided-skip" : "";

    return `
      <div class="card ${cardClass}">
        <div class="card-top">
          <div class="card-title">${escapeHtml(s.title)}</div>
          <div class="score-badge">${s.score}点</div>
        </div>
        <div class="reason">${escapeHtml(s.reason || "")}</div>
        <div class="meta">
          <span>${escapeHtml(s.area || "")}</span>
          <span>${formatMoney(s.max_limit)}</span>
          <span class="${deadline.soon ? "deadline-soon" : ""}">${deadline.text}</span>
        </div>
        <div class="actions">
          <button class="btn btn-apply ${decision === "apply" ? "active" : ""}" onclick="setDecision('${s._key}', 'apply')">申請する</button>
          <button class="btn btn-skip ${decision === "skip" ? "active" : ""}" onclick="setDecision('${s._key}', 'skip')">見送る</button>
          ${decision ? `<button class="btn btn-reset" onclick="setDecision('${s._key}', null)" title="選択を取り消す">×</button>` : ""}
        </div>
        ${decision === "apply" ? renderSupportSection(s._key) : ""}
      </div>
    `;
  }).join("");
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function setDecision(key, decision) {
  if (decision === null) {
    db.ref(`hojokin/decisions/${key}`).remove();
  } else {
    db.ref(`hojokin/decisions/${key}`).set({
      decision,
      decided_at: new Date().toISOString(),
    });
  }
}

document.querySelectorAll(".filter-btn").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

firebase.auth().signInAnonymously().then(() => {
  db.ref("hojokin/subsidies").on("value", (snap) => {
    const val = snap.val() || {};
    subsidies = Object.keys(val).map((key) => ({ _key: key, ...val[key] }));
    render();
  });

  db.ref("hojokin/decisions").on("value", (snap) => {
    decisions = snap.val() || {};
    render();
  });
}).catch((err) => {
  document.getElementById("list").innerHTML =
    `<div class="status-msg">認証エラー: ${escapeHtml(err.message)}</div>`;
});
</script>

</body>
</html>
